<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방명록 - 바이브 코딩</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            슬라이드로 돌아가기
        </a>

        <header>
            <h1>방명록</h1>
        </header>

        <main class="guestbook-container">
            <section>
                <form id="guestbook-form" class="guestbook-form">
                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" placeholder="방문자 이름을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="message">메시지</label>
                        <textarea id="message" name="message" rows="4" placeholder="메시지를 남겨주세요" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">메시지 남기기</button>
                </form>
            </section>

            <section>
                <div class="table-container">
                    <table id="message-table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">No.</th>
                                <th style="width: 150px;">이름</th>
                                <th>메시지</th>
                                <th style="width: 200px;">작성일</th>
                            </tr>
                        </thead>
                        <tbody id="message-body">
                            <!-- Messages will be rendered here -->
                        </tbody>
                    </table>
                    <div id="loading-state" style="text-align: center; color: var(--text-secondary); padding: 2rem;">
                        메시지를 불러오는 중...
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <span>바이브 코딩 &copy; 2026</span>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://msvzjxugvptyefusmoar.supabase.co';
        const supabaseKey = 'sb_publishable_tA8MgkM9g4ZUjfn-posoBQ_hv16dc7z';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('guestbook-form');
        const messageBody = document.getElementById('message-body');
        const loadingState = document.getElementById('loading-state');

        async function renderMessages() {
            loadingState.style.display = 'block';
            
            const { data: messages, error } = await _supabase
                .from('board')
                .select('*')
                .order('date', { ascending: false });

            loadingState.style.display = 'none';

            if (error) {
                console.error('Error fetching messages:', error);
                messageBody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 2rem;">메시지를 불러오는 데 실패했습니다.</td></tr>';
                return;
            }

            messageBody.innerHTML = '';
            
            if (!messages || messages.length === 0) {
                messageBody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 2rem;">아직 남겨진 메시지가 없습니다. 첫 번째 메시지를 남겨보세요!</td></tr>';
                return;
            }

            messages.forEach((msg, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: var(--text-secondary);">${messages.length - index}</td>
                    <td class="tool-name">${msg.name}</td>
                    <td style="white-space: pre-wrap;">${msg.content}</td>
                    <td style="color: var(--text-secondary); font-size: 0.85rem;">${new Date(msg.date).toLocaleString('ko-KR')}</td>
                `;
                messageBody.appendChild(tr);
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nameInput = document.getElementById('name');
            const messageInput = document.getElementById('message');
            const btnSubmit = form.querySelector('.btn-submit');

            const name = nameInput.value;
            const content = messageInput.value;

            btnSubmit.disabled = true;
            btnSubmit.textContent = '보내는 중...';

            const { error } = await _supabase
                .from('board')
                .insert([{ name, content }]);

            btnSubmit.disabled = false;
            btnSubmit.textContent = '메시지 남기기';

            if (error) {
                alert('메시지 저장에 실패했습니다. (SQL 테이블 이름이 "board"인지 확인해주세요)');
                console.error(error);
                return;
            }

            nameInput.value = '';
            messageInput.value = '';
            
            await renderMessages();
        });

        // Initial render
        renderMessages();
    </script>
</body>
</html>
