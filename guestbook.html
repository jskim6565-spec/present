<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방명록 - 바이브 코딩</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            슬라이드로 돌아가기
        </a>

        <header>
            <h1>방명록</h1>
        </header>

        <main class="guestbook-container">
            <section>
                <form id="guestbook-form" class="guestbook-form">
                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" placeholder="방문자 이름을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="message">메시지</label>
                        <textarea id="message" name="message" rows="4" placeholder="메시지를 남겨주세요" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">메시지 남기기</button>
                </form>
            </section>

            <section>
                <div id="message-list" class="message-list">
                    <!-- Messages will be rendered here -->
                </div>
            </section>
        </main>

        <footer>
            <span>바이브 코딩 &copy; 2026</span>
        </footer>
    </div>

    <script>
        const form = document.getElementById('guestbook-form');
        const messageList = document.getElementById('message-list');

        // Load messages from localStorage
        let messages = JSON.parse(localStorage.getItem('guestbook_messages')) || [];

        function renderMessages() {
            messageList.innerHTML = '';
            
            if (messages.length === 0) {
                messageList.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">아직 남겨진 메시지가 없습니다. 첫 번째 메시지를 남겨보세요!</p>';
                return;
            }

            messages.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(msg => {
                const card = document.createElement('div');
                card.className = 'message-card';
                card.innerHTML = `
                    <div class="message-header">
                        <span class="message-name">${msg.name}</span>
                        <span class="message-date">${new Date(msg.date).toLocaleString('ko-KR')}</span>
                    </div>
                    <div class="message-content">${msg.content}</div>
                `;
                messageList.appendChild(card);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const nameInput = document.getElementById('name');
            const messageInput = document.getElementById('message');

            const newMessage = {
                name: nameInput.value,
                content: messageInput.value,
                date: new Date().toISOString()
            };

            messages.push(newMessage);
            localStorage.setItem('guestbook_messages', JSON.stringify(messages));

            nameInput.value = '';
            messageInput.value = '';
            
            renderMessages();
        });

        // Initial render
        renderMessages();
    </script>
</body>
</html>
